<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Change Management Portal</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; }
    h1 { margin-bottom: 20px; }
    label { display: block; margin-top: 12px; font-weight: bold; }
    input, textarea, select { width: 100%; padding: 8px; margin-top: 4px; }
    button { margin-top: 20px; padding: 10px 18px; cursor: pointer; }
    .btn-row button { margin-right: 10px; }
    #result { margin-top: 20px; font-weight: bold; }
  </style>
</head>

<body>

  <h1>ServiceNow Change Request Portal</h1>

  <div class="btn-row">
    <button id="btnNormal">Create Normal Change</button>
    <button id="btnStandard">Create Standard Change</button>
  </div>

  <form id="changeForm" style="display:none; margin-top:20px;">
    <input type="hidden" id="changeType">

    <label>Coordinated Group</label>
    <input type="text" id="coordinatedGroup">

    <label>Implementation Start</label>
    <input type="datetime-local" id="startDate">

    <label>Implementation End</label>
    <input type="datetime-local" id="endDate">

    <label>Short Description</label>
    <input type="text" id="shortDescription">

    <label>Description</label>
    <textarea id="description" rows="4"></textarea>

    <label>Business Justification</label>
    <textarea id="businessJustification" rows="3"></textarea>

    <label>Search Component</label>
    <input type="text" id="componentSearch" placeholder="Type to search...">

    <label>Select Component</label>
    <select id="componentSelect">
      <option value="">-- Select --</option>
    </select>

    <button type="submit">Submit Change Request</button>
  </form>

  <div id="result"></div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {

      const btnNormal = document.getElementById("btnNormal");
      const btnStandard = document.getElementById("btnStandard");
      const form = document.getElementById("changeForm");
      const changeTypeInput = document.getElementById("changeType");
      const resultDiv = document.getElementById("result");

      // Show form for Normal Change
      btnNormal.addEventListener("click", () => {
        changeTypeInput.value = "normal";
        form.style.display = "block";
        resultDiv.textContent = "";
      });

      // Show form for Standard Change
      btnStandard.addEventListener("click", () => {
        changeTypeInput.value = "standard";
        form.style.display = "block";
        resultDiv.textContent = "";
      });

      // Fake component list for testing
      const fakeComponents = [
        { sys_id: "1", name: "Database Server" },
        { sys_id: "2", name: "Web Server" },
        { sys_id: "3", name: "API Gateway" }
      ];

      // Component search simulation
      document.getElementById("componentSearch").addEventListener("input", () => {
        const q = document.getElementById("componentSearch").value.toLowerCase();
        const results = fakeComponents.filter(c => c.name.toLowerCase().includes(q));

        const componentSelect = document.getElementById("componentSelect");
        componentSelect.innerHTML = "<option value=''>-- Select --</option>";

        results.forEach(c => {
          const opt = document.createElement("option");
          opt.value = c.sys_id;
          opt.textContent = c.name;
          componentSelect.appendChild(opt);
        });
      });

      // Form submit handler with fake backend
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        resultDiv.textContent = "Submitting...";

        const payload = {
          type: document.getElementById("changeType").value,
          coordinated_group: document.getElementById("coordinatedGroup").value,
          start_date: document.getElementById("startDate").value,
          end_date: document.getElementById("endDate").value,
          short_description: document.getElementById("shortDescription").value,
          description: document.getElementById("description").value,
          business_justification: document.getElementById("businessJustification").value,
          cmdb_ci: document.getElementById("componentSelect").value
        };

        // Simulate backend delay
        await new Promise(resolve => setTimeout(resolve, 1000));

        // Fake response
        const fakeResponse = {
          number: "CHG" + Math.floor(Math.random() * 900000 + 100000),
          sys_id: "FAKE_SYS_ID_" + Math.floor(Math.random() * 999999)
        };

        resultDiv.textContent = "Change created successfully: " + fakeResponse.number;
      });

    });
  </script>

</body>
</html>
